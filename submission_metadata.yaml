ai_usage_summary: |
  Used OpenAI Codex / ChatGPT for architecture discussion, code review,
  implementation support, README drafting, and PPT content preparation.
  The ranking pipeline itself does not call hosted LLM APIs and no candidate
  data is sent to external LLM services during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Offline hybrid ranker for the Senior AI Engineer - Founding Team JD. The
  system streams and normalizes 100,000 candidate profiles, detects honeypots
  and suspicious profiles before scoring, extracts career-grounded evidence for
  production search, ranking, retrieval, recommendation, embeddings, evaluation,
  Python, and product-context work, then applies a local BGE transformer signal
  only after a cheap JD-evidence prefilter. Final scoring is transparent and
  evidence-weighted: career history outweighs keyword skills, severe temporal
  contradictions are hard-zeroed, and logistics such as notice period and
  recruiter responsiveness are penalized. The output is a validator-ready top
  100 CSV with grounded 1-2 sentence reasoning for every selected candidate.

